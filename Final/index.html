<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchanted Bakery</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato&display=swap" rel="stylesheet">

  <!-- JS -->
   <script type="module" src="script.js" defer></script>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo-container">
      <img src="imgs/FantasyBakeryLogo.png" alt="Enchanted Bakery logo" class="logo">
      <h1>The Enchanted Bakery</h1>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <!-- ===== HERO SECTION ===== -->
    <section class="hero">

        <div class="overlay overlay1"><hr></div>
        <div class="overlay overlay2"><hr></div>

        <h2>Welcome to the Enchanted Bakery</h2>
        <p>Hidden deep in the forest, our treats are baked with a touch of magic.</p>

    </section>

    <!-- ===== TODAY'S SPECIAL ===== -->
    <section class="special">
        <h3>Today's Special</h3>
        <div id="special-item" class="card">
        <!-- JS insert of a random item here -->
        <p>Click the button to discover today's treat!</p>
        </div>
        <button id="special-btn" aria-label="Show today's special bakery item">Show Special</button>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Enchanted Bakery</p>
  </footer>

</body>
</html>
