<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Enchanted Bakery</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato&display=swap" rel="stylesheet">

  <!-- JavaScript -->
  <script src="script.js" defer></script>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo-container">
      <img src="imgs/FantasyBakeryLogo.png" alt="Enchanted Bakery logo" class="logo">
      <h1>The Enchanted Bakery</h1>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>

    <!-- ===== PAGE TITLE ===== -->
    <section class="menu-header">
      <h2>Our Magical Menu</h2>
      <p>Explore enchanted treats from our woodland bakery.</p>
    </section>

    <!-- ===== SEARCH + FILTER ===== -->
    <section class="controls">

      <!-- Search -->
      <input 
        type="text" 
        id="search-input" 
        placeholder="Search for a treat..."
      >

      <!-- Filter Buttons -->
      <div class="filter-buttons">
        <button data-category="dessert">Desserts</button>
        <button data-category="bread">Bread</button>
        <button data-category="drink">Drinks</button>
      </div>

    </section>

    <!-- ===== MENU ITEMS (JS will fill this) ===== -->
    <section id="menu-container" class="menu-grid">
      <!-- Inserted by JavaScript -->
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Enchanted Bakery</p>
  </footer>


</body>
</html>
